<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>RCP Packing Visualizer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #0d0d10; overflow: hidden;
                 font-family: system-ui, sans-serif; color: #ddd; }
    #deck { position: absolute; inset: 0; }
    #hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            color: #888; font-size: 15px; text-align: center; pointer-events: none; }
  </style>
</head>
<body>
  <div id="deck"></div>
  <div id="hint">Drag a packing bundle (folder or .zip) here, or:</div>
  <div id="loaders">
    <label class="pick">📁 Choose bundle folder<input id="dirpick" type="file" webkitdirectory directory multiple hidden></label>
    <label class="pick">📄 Choose bundle files<input id="filepick" type="file" multiple hidden></label>
  </div>
  <style>
    #loaders { position: absolute; top: calc(50% + 24px); left: 50%; transform: translateX(-50%);
               display: flex; gap: 10px; }
    .pick { background: #2a3550; color: #dde; padding: 8px 14px; border-radius: 6px; cursor: pointer;
            font-size: 13px; border: 1px solid #46577f; }
    .pick:hover { background: #34426a; }
  </style>
  <script src="vendor/deck.gl.min.js"></script>
  <script src="js/loader.js"></script>
  <script src="js/render2d.js"></script>
  <script src="js/wrap.js"></script>
  <script src="js/slice.js"></script>
  <script src="js/colormap.js"></script>
  <script src="js/palettes.js"></script>
  <script src="js/color.js"></script>
  <script src="js/overlay_pores.js"></script>
  <script src="js/diag.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/export.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
